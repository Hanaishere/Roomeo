<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DormFindr</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-8 py-4 bg-white shadow-sm">
    <h1 class="text-2xl font-bold text-blue-600">DormFindr</h1>
    <div class="space-x-4">
      <a href="admin.html" class="px-4 py-2 text-gray-700 hover:text-blue-600">Listing</a>
      <button class="px-4 py-2 text-gray-700 hover:text-blue-600">Login</button>
      <button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Sign Up</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="px-10 py-20 grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
    <div>
      <h2 class="text-5xl font-bold leading-tight">
        Find your  <span class="text-blue-600">perfect stay</span><br>in minutes.
      </h2>
      <p class="mt-4 text-gray-600 text-lg">
        Explore dorms, PGs, and hostels with verified photos, prices, and nearby essentials.
      </p>
    </div>

    <img src="header.webp"
         class="rounded-2xl shadow-lg" />
  </section>

  <!-- LISTINGS -->
  <section class="px-10 py-10">
    <h3 class="text-3xl font-bold mb-6">Top Places</h3>
    <div id="publicList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
  </section>

  <footer class="text-center py-6 mt-10 text-gray-500">
    © 2025 DormFindr. All rights reserved.
  </footer>

  <script>
    const API = "http://localhost:8080/api/dorms";

    async function loadPublicDorms() {
      const res = await fetch(API);
      const data = await res.json();
      const container = document.getElementById("publicList");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No listings yet</p>";
        return;
      }

      data.forEach(d => {
        container.innerHTML += `
          <div class="bg-white rounded-2xl shadow p-4 hover:shadow-xl transition">
            <img src="${d.imageUrl}" class="w-full h-56 object-cover rounded-xl" />
            <h4 class="mt-4 text-xl font-semibold">${d.name}</h4>
            <p class="text-gray-500">${d.city}</p>
            <p class="mt-2 font-bold text-blue-600 text-lg">₹${d.price}</p>
          </div>`;
      });
    }

    loadPublicDorms();
  </script>

</body>
</html>
